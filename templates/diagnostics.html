<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Advanced Diagnostics</title>

  <style>
    body {
      margin: 0;
      font-family: Arial;
      background: linear-gradient(135deg, #062a20, #0b4d38);
      color: white;
    }

    .container {
      padding: 40px;
    }

    h1 {
      text-align: center;
      margin-bottom: 30px;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(250px,1fr));
      gap: 20px;
    }

    .card {
      background: white;
      color: black;
      padding: 15px;
      border-radius: 10px;
      text-align: center;
    }

    .card img {
      width: 100%;
      height: 180px;
      object-fit: cover;
      border-radius: 10px;
    }

  </style>
</head>

<body>

<div class="container">

<h1>Advanced Diagnostics</h1>

<div class="grid">

  <div class="card">
    <img src="{{ url_for('static', filename='images/laboratory.jpg') }}">
    
    <h3>
        <a href="/diagnostic/lab" class="card-link">Laboratory</a>
    </h3>

    <p>Blood tests and lab services</p>
 </div>

  <div class="card">
    <img src="{{ url_for('static', filename='images/mri scan.jpg') }}">
    
    <h3>
        <a href="/diagnostic/mri" class="card-link">MRI</a>
    </h3>

    <p>Advanced brain imaging</p>
 </div>

  <div class="card">
    <img src="{{ url_for('static', filename='images/ct scan.jpg') }}">
    
    <h3>
        <a href="/diagnostic/ct" class="card-link">CT Scan</a>
    </h3>

    <p>Detailed body scans</p>
 </div>

  <div class="card">
    <img src="{{ url_for('static', filename='images/xray.jpg') }}">
    
    <h3>
        <a href="/diagnostic/xray" class="card-link">X-Ray</a>
    </h3>

    <p>Bone and chest imaging</p>
 </div>

  <div class="card">
    <img src="{{ url_for('static', filename='images/ultrasound.jpg') }}">
    
    <h3>
        <a href="/diagnostic/ultrasound" class="card-link">Ultrasound</a>
    </h3>

    <p>Pregnancy and organ monitoring</p>
  </div>


</div>

</div>

</body>
</html>
